# Build + publish desktop installers when a version tag is pushed.
#
#   git tag v0.12.0 && git push origin v0.12.0
#
# Builds the macOS .app and Windows .exe on GitHub's runners, attaches both
# to the GitHub Release, then announces it to installed apps by publishing
# app/version.json via deploy.php (needs the DEPLOY_TOKEN repo secret).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "existing tag to (re)build, e.g. v0.11.13"
        required: true

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.tag || github.ref_name }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        # pillow + pynput + Vision: the in-game scanner (screen capture, global
        # hotkey, Apple Vision OCR). All tiny; OCR models are the OS's own.
        run: pip install requests pywebview pyinstaller pillow pynput pyobjc-framework-Vision
      - name: Build .app
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "SWG Tracker Desktop" \
            --icon build/icon.icns \
            --osx-bundle-identifier com.swgtracker.desktop \
            --add-data "web:web" \
            --add-data "src/resources:src/resources" \
            run_web.py
      - name: Zip
        run: |
          VER="${RELEASE_TAG#v}"
          ditto -c -k --keepParent "dist/SWG Tracker Desktop.app" "dist/SWG-Tracker-Desktop-${VER}-macos.zip"
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/*.zip }

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.tag || github.ref_name }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        # pynput + winsdk: the in-game scanner (global hotkey + Windows.Media.Ocr
        # — the OS's built-in OCR, no Tesseract install, no bundled models).
        run: pip install requests pywebview pyinstaller pillow pynput winsdk
      - name: Make .ico
        run: python -c "from PIL import Image; Image.open('src/resources/icon.png').save('build/icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
      - name: Version resource for the exe (file properties otherwise say 0.0.0.0)
        shell: pwsh
        run: |
          $ver = $env:RELEASE_TAG -replace '^v',''
          $parts = ($ver -split '\.') + @('0','0','0')
          $tuple = ($parts[0..3] -join ', ')
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(filevers=($tuple), prodvers=($tuple)),
            kids=[StringFileInfo([StringTable('040904B0', [
              StringStruct('CompanyName', 'swgtracker.com'),
              StringStruct('FileDescription', 'SWG Tracker Desktop'),
              StringStruct('FileVersion', '$ver'),
              StringStruct('ProductName', 'SWG Tracker Desktop'),
              StringStruct('ProductVersion', '$ver')])]),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])]
          )
          "@ | Set-Content build/win_version_info.txt
      - name: Build .exe
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name "SWG Tracker Desktop"
          --icon build/icon.ico
          --version-file build/win_version_info.txt
          --add-data "web;web"
          --add-data "src/resources;src/resources"
          --hidden-import src.core.win_overlay
          run_web.py
      - name: Build installer (zip-extracted DLLs hit Mark-of-the-Web; installed files don't)
        shell: pwsh
        run: |
          $ver = $env:RELEASE_TAG -replace '^v',''
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver build\installer.iss
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/*-windows-setup.exe }

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: "${{ inputs.tag || github.ref_name }}" }
      - uses: actions/download-artifact@v4
        with: { path: assets, merge-multiple: true }
      - name: Release notes from versioned commits
        id: notes
        run: |
          PREV=$(git describe --tags --match "v*" --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)
          RANGE=${PREV:+$PREV..}${RELEASE_TAG}
          # keep dev/tooling commits (ci:/chore:/docs:) out of user-facing notes
          git log --format='%s' $RANGE | sed -nE 's/^v[0-9.]+ — (.+)$/- \1/p' \
            | { grep -viE '^- (ci|chore|docs):' || true; } | head -20 > notes.md
          [ -s notes.md ] || echo "SWG Tracker Desktop ${RELEASE_TAG}" > notes.md
          cat notes.md
      - name: Stable-name aliases (evergreen /releases/latest/download URLs)
        run: |
          cd assets
          for f in *-macos.zip;         do cp "$f" SWG-Tracker-Desktop-macos.zip; done
          for f in *-windows-setup.exe; do cp "$f" SWG-Tracker-Desktop-windows-setup.exe; done
          ls -la
      - name: Create release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release create "$RELEASE_TAG" assets/* \
            --title "SWG Tracker Desktop ${RELEASE_TAG#v}" \
            --notes-file notes.md || \
          gh release upload "$RELEASE_TAG" assets/* --clobber
      - name: Announce to installed apps (version.json)
        if: ${{ vars.ANNOUNCE != 'off' }}
        env: { DEPLOY_TOKEN: "${{ secrets.DEPLOY_TOKEN }}" }
        run: |
          VER="${RELEASE_TAG#v}"
          curl -sf -X POST "https://swgtracker.com/app/deploy.php?action=shellrelease" \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" \
            --data-urlencode "version=${VER}" \
            --data-urlencode "url=https://swgtracker.com/download.php" \
            --data-urlencode "notes=$(head -c 480 notes.md)"
          echo "version.json published — installed apps will offer v${VER}"
