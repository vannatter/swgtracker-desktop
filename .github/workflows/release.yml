# Build + publish desktop installers when a version tag is pushed.
#
#   git tag v0.12.0 && git push origin v0.12.0
#
# Builds the macOS .app and Windows .exe on GitHub's runners, attaches both
# to the GitHub Release, then announces it to installed apps by publishing
# app/version.json via deploy.php (needs the DEPLOY_TOKEN repo secret).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install requests pywebview pyinstaller
      - name: Build .app
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "SWG Tracker Desktop" \
            --icon build/icon.icns \
            --osx-bundle-identifier com.swgtracker.desktop \
            --add-data "web:web" \
            --add-data "src/resources:src/resources" \
            run_web.py
      - name: Zip
        run: |
          VER="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent "dist/SWG Tracker Desktop.app" "dist/SWG-Tracker-Desktop-${VER}-macos.zip"
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/*.zip }

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install requests pywebview pyinstaller pillow
      - name: Make .ico
        run: python -c "from PIL import Image; Image.open('src/resources/icon.png').save('build/icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
      - name: Build .exe
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name "SWG Tracker Desktop"
          --icon build/icon.ico
          --add-data "web;web"
          --add-data "src/resources;src/resources"
          run_web.py
      - name: Zip
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v',''
          Compress-Archive -Path "dist/SWG Tracker Desktop" -DestinationPath "dist/SWG-Tracker-Desktop-$ver-windows.zip"
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/*.zip }

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { path: assets, merge-multiple: true }
      - name: Release notes from versioned commits
        id: notes
        run: |
          PREV=$(git describe --tags --match "v*" --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=${PREV:+$PREV..}${GITHUB_REF_NAME}
          git log --format='%s' $RANGE | sed -nE 's/^v[0-9.]+ — (.+)$/- \1/p' | head -20 > notes.md
          [ -s notes.md ] || echo "SWG Tracker Desktop ${GITHUB_REF_NAME}" > notes.md
          cat notes.md
      - name: Create release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release create "$GITHUB_REF_NAME" assets/*.zip \
            --title "SWG Tracker Desktop ${GITHUB_REF_NAME#v}" \
            --notes-file notes.md || \
          gh release upload "$GITHUB_REF_NAME" assets/*.zip --clobber
      - name: Announce to installed apps (version.json)
        if: ${{ vars.ANNOUNCE != 'off' }}
        env: { DEPLOY_TOKEN: "${{ secrets.DEPLOY_TOKEN }}" }
        run: |
          VER="${GITHUB_REF_NAME#v}"
          curl -sf -X POST "https://swgtracker.com/app/deploy.php?action=shellrelease" \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" \
            --data-urlencode "version=${VER}" \
            --data-urlencode "url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --data-urlencode "notes=$(head -c 480 notes.md)"
          echo "version.json published — installed apps will offer v${VER}"
